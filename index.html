<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title> Cat & Image </title>
    <link rel="stylesheet"  href="style.css">
</head>
<body>
    
    <div class="dark-background">
        <div>
            <img id="bulbImage" class="bulb-image" src="https://d2clawv67efefq.cloudfront.net/ccbp-dynamic-webapps/bulb-go-on-img.png"/>
    
        </div>
        <div>
            <img id="catImage" class="cat-image" src="https://d2clawv67efefq.cloudfront.net/ccbp-dynamic-webapps/cat-img.png"/>
        </div>
        <div class="d-flex flex-row justify-content-center pt-5">
            <div class="switch-board">
                <h1 id="switchStatus" class="switch-status"> Switched On </h1>
                <button id="offSwitch" class="off-switch" onclick="switchOff()"> OFF </button>
                <button id="onSwitch" class="on-switch" onclick="switchOn()"> ON </button>

            </div>
        </div>
    
    </div>



    <script src="script.js"></script>
</body>
</html>
